name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Python — lint (ruff format + ruff check + mypy)
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: ruff format
        run: uv run ruff format --check backend/ tests/

      - name: ruff check
        run: uv run ruff check backend/ tests/

      - name: mypy
        run: uv run mypy backend/

  # ---------------------------------------------------------------------------
  # Python — tests (pytest)
  # ---------------------------------------------------------------------------
  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: pytest
        run: uv run pytest -m "not integration" --cov-fail-under=80

  # ---------------------------------------------------------------------------
  # TypeScript — lint (prettier + ESLint)
  # Skips gracefully when web/ doesn't exist yet (before T11 React curator).
  # ---------------------------------------------------------------------------
  web-lint:
    name: TypeScript lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for web project
        id: web
        run: |
          if [ -f web/package.json ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
            echo "No web/package.json — skipping TypeScript lint (T11 not yet built)"
          fi

      - uses: actions/setup-node@v6
        if: steps.web.outputs.present == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.web.outputs.present == 'true'
        run: npm ci
        working-directory: web

      - name: prettier
        if: steps.web.outputs.present == 'true'
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"
        working-directory: web

      - name: ESLint
        if: steps.web.outputs.present == 'true'
        run: npx eslint --max-warnings 0 src
        working-directory: web

  # ---------------------------------------------------------------------------
  # TypeScript — tests (vitest + coverage)
  # ---------------------------------------------------------------------------
  web-test:
    name: TypeScript tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for web project
        id: web
        run: |
          if [ -f web/package.json ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
            echo "No web/package.json — skipping TypeScript tests"
          fi

      - uses: actions/setup-node@v6
        if: steps.web.outputs.present == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.web.outputs.present == 'true'
        run: npm ci
        working-directory: web

      - name: vitest
        if: steps.web.outputs.present == 'true'
        run: npx vitest run --coverage
        working-directory: web

  # ---------------------------------------------------------------------------
  # Swift — build, test, swift-format lint
  # ---------------------------------------------------------------------------
  swift-ci:
    name: Swift CI
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      - name: Swift coverage gate (≥70%)
        run: |
          PROFDATA=$(find .build -name 'default.profdata' 2>/dev/null | head -1)
          XCTEST=$(find .build -name '*.xctest' -path '*/debug/*' 2>/dev/null | head -1)
          if [ -n "$PROFDATA" ] && [ -n "$XCTEST" ]; then
            BINARY="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
            # Exclude Views, Camera, and the app entry point — they require a live UI
            # context (display, AVCaptureSession) and cannot be covered by unit tests.
            if ! xcrun llvm-cov report "$BINARY" \
              -instr-profile="$PROFDATA" \
              --ignore-filename-regex='.*Tests.*|.*/Views/.*|.*/Camera/.*|.*VisualWinelistApp.*' \
              2>/dev/null > /tmp/swift-cov.txt; then
              echo "llvm-cov report failed — binary or profdata mismatch; coverage gate cannot run"
              exit 1
            fi
            cat /tmp/swift-cov.txt
            # Extract line coverage (last XX.XX% in the TOTAL row; branch column shows '-').
            TOTAL=$(grep '^TOTAL' /tmp/swift-cov.txt | grep -oE '[0-9]+\.[0-9]+%' | tail -1 | tr -d '%')
            echo "Swift coverage: ${TOTAL:--}%"
            if [ -z "$TOTAL" ]; then
              echo "Could not parse coverage percentage from llvm-cov output"
              exit 1
            fi
            SWIFT_COV_MIN=70
            python3 -c "import sys; cov=float('$TOTAL'); sys.exit(0 if cov >= $SWIFT_COV_MIN else 1)" || \
              { echo "Swift coverage ${TOTAL}% is below the ${SWIFT_COV_MIN}% minimum"; exit 1; }
          else
            echo "::warning::Swift coverage data not found — threshold check skipped (build may have produced no profdata)"
          fi

      - name: Format check (swift-format)
        # swift format lint exits 0 even with warnings — use format+diff instead.
        # Formats all Swift in-place; git diff catches any files that changed.
        # ios/Sources and ios/Tests are included so the iOS client is covered.
        run: |
          swift format format -r -i --configuration .swift-format \
            Sources Tests ios/Sources ios/Tests Scripts
          git diff --exit-code -- '*.swift' || {
            echo ""
            echo "Swift formatting violations. Fix locally with:"
            echo "  xcrun swift-format format -r -i --configuration .swift-format Sources Tests ios/Sources ios/Tests Scripts"
            exit 1
          }

      - name: Lint (SwiftLint)
        run: |
          if ! command -v swiftlint &>/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint --config .swiftlint.yml Sources Tests ios/Sources ios/Tests

  # ---------------------------------------------------------------------------
  # Security — gitleaks secret scan (full history on every push/PR)
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SHA pinned to v2.3.9 for supply-chain safety (re-pin on each new release via:
      #   gh api repos/gitleaks/gitleaks-action/git/refs/tags/v2.3.9 | jq -r '.object.sha')
      # TODO(public-repo): uncomment GITLEAKS_LICENSE to enforce on fork PRs when this
      # repo is public (forked GITHUB_TOKEN lacks write permissions without the license).
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
