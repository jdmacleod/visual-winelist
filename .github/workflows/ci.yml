name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Python — lint (ruff format + ruff check + mypy)
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: ruff format
        run: uv run ruff format --check backend/ tests/

      - name: ruff check
        run: uv run ruff check backend/ tests/

      - name: mypy
        run: uv run mypy backend/

  # ---------------------------------------------------------------------------
  # Python — tests (pytest)
  # ---------------------------------------------------------------------------
  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: pytest
        run: uv run pytest -m "not integration" --cov-fail-under=80

  # ---------------------------------------------------------------------------
  # TypeScript — lint (prettier + ESLint)
  # Skips gracefully when web/ doesn't exist yet (before T11 React curator).
  # ---------------------------------------------------------------------------
  web-lint:
    name: TypeScript lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check for web project
        id: web
        run: |
          if [ -f web/package.json ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
            echo "No web/package.json — skipping TypeScript lint (T11 not yet built)"
          fi

      - uses: actions/setup-node@v6
        if: steps.web.outputs.present == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.web.outputs.present == 'true'
        run: npm ci
        working-directory: web

      - name: prettier
        if: steps.web.outputs.present == 'true'
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"
        working-directory: web

      - name: ESLint
        if: steps.web.outputs.present == 'true'
        run: npx eslint --max-warnings 0 src
        working-directory: web

  # ---------------------------------------------------------------------------
  # TypeScript — tests (vitest + coverage)
  # ---------------------------------------------------------------------------
  web-test:
    name: TypeScript tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check for web project
        id: web
        run: |
          if [ -f web/package.json ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
            echo "No web/package.json — skipping TypeScript tests"
          fi

      - uses: actions/setup-node@v6
        if: steps.web.outputs.present == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.web.outputs.present == 'true'
        run: npm ci
        working-directory: web

      - name: vitest
        if: steps.web.outputs.present == 'true'
        run: npx vitest run --coverage
        working-directory: web

  # ---------------------------------------------------------------------------
  # Swift — build, test, swift-format lint
  # ---------------------------------------------------------------------------
  swift-ci:
    name: Swift CI
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      # The macOS client (Sources/VisualWinelist) was removed in E15 — iOS is now
      # the only Swift client, so there is no root `swift build`/`swift test`. The
      # iOS XCTest suite below is the Swift test gate. (The old 70% line-coverage
      # gate measured the macOS mirror's shared-logic subset; re-establishing a
      # fair iOS coverage baseline is tracked separately — see TODOS E16.)

      - name: Format check (swift-format)
        # swift format lint exits 0 even with warnings — use format+diff instead.
        # Formats all Swift in-place; git diff catches any files that changed.
        run: |
          swift format format -r -i --configuration .swift-format \
            ios/Sources ios/Tests Scripts
          git diff --exit-code -- '*.swift' || {
            echo ""
            echo "Swift formatting violations. Fix locally with:"
            echo "  xcrun swift-format format -r -i --configuration .swift-format ios/Sources ios/Tests Scripts"
            exit 1
          }

      - name: Lint (SwiftLint)
        run: |
          if ! command -v swiftlint &>/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint --config .swiftlint.yml ios/Sources ios/Tests

      - name: Generate Xcode project (XcodeGen)
        # The .xcodeproj is generated from ios/project.yml, never committed (E15),
        # so a new source file can't be forgotten from a hand-maintained file list.
        run: |
          brew list xcodegen &>/dev/null || brew install xcodegen
          cd ios && xcodegen generate

      - name: Build iOS client (Xcode project + SwiftPM)
        # The iOS client has two build worlds with OPPOSITE module rules:
        #   - ios/VisualWinelistIOS.xcodeproj (generated): one app target, the
        #     DebugBridge sources compiled in directly (NO module imports).
        #   - ios/Package.swift: DebugBridge* are separate modules (imports required).
        # canImport() bridges both. Build each so a missing source or an unguarded
        # import can't break device builds while CI stays green.
        run: |
          set -euo pipefail
          # 1) Xcode project — the device-build path (compile only, no signing).
          xcodebuild build \
            -project ios/VisualWinelistIOS.xcodeproj \
            -scheme VisualWinelistIOS \
            -destination "generic/platform=iOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          # 2) SwiftPM package — run the iOS XCTest suite (it only builds/runs via
          #    the package, not the xcodeproj). The xcodeproj shadows the package
          #    for xcodebuild, so move it aside, test, then restore.
          cd ios
          mv VisualWinelistIOS.xcodeproj /tmp/_vwl_xcodeproj
          trap 'mv /tmp/_vwl_xcodeproj VisualWinelistIOS.xcodeproj' EXIT
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone 1[5-9][^(]*' | head -1 | xargs)
          xcodebuild test \
            -scheme VisualWinelistIOS \
            -destination "platform=iOS Simulator,name=${DEVICE:-iPhone 16}" \
            CODE_SIGNING_ALLOWED=NO

  # ---------------------------------------------------------------------------
  # Security — gitleaks secret scan (full history on every push/PR)
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # SHA pinned to v2.3.9 for supply-chain safety (re-pin on each new release via:
      #   gh api repos/gitleaks/gitleaks-action/git/refs/tags/v2.3.9 | jq -r '.object.sha')
      # TODO(public-repo): uncomment GITLEAKS_LICENSE to enforce on fork PRs when this
      # repo is public (forked GITHUB_TOKEN lacks write permissions without the license).
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
