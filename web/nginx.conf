server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API routes to the backend.
    # proxy_buffering off + proxy_http_version 1.1 + Connection '' are required
    # for SSE streaming on the /scan endpoint — without them nginx buffers the
    # entire response before forwarding, which breaks the event stream UX.
    location ~ ^/(wines|curate|health|scan) {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # React SPA — everything else resolves to index.html so client-side
    # routing works on hard refresh or direct URL access.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
