repos:
  # ---------------------------------------------------------------------------
  # Secret scanning — must run before any other hook
  # Catches API keys, tokens, and credentials before they reach git history.
  # Allowlisted patterns: see .gitleaks.toml
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---------------------------------------------------------------------------
  # Python — ruff (format + lint)
  # Managed hook: pre-commit downloads the correct ruff binary automatically.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-format
        files: ^backend/
      - id: ruff
        files: ^backend/
        args: [--fix, --exit-non-zero-on-fix]

  # ---------------------------------------------------------------------------
  # Python — mypy (type checking)
  # Uses the project's own uv environment so the installed stubs match exactly.
  # Requires: uv sync --group dev  (done once per clone).
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && uv run mypy backend/'
        language: system
        files: ^backend/backend/.*\.py$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Swift — swift-format (formatting)
  # Uses Xcode-bundled swift-format via xcrun — requires Xcode installed.
  # Formats files in-place; re-stage the fixed files to unblock the commit.
  # Mirrors the CI swift-ci "Format check" step.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: swift-format
        name: swift-format
        entry: xcrun swift-format format -i --configuration .swift-format
        language: system
        files: \.swift$
        pass_filenames: true

  # ---------------------------------------------------------------------------
  # Swift — SwiftLint (linting)
  # Uses system-installed SwiftLint (brew install swiftlint).
  # Runs lint only — formatting is handled by swift-format above.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: swiftlint
        name: swiftlint
        # Explicit paths mirror the CI step — Scripts/ is excluded (eval scripts
        # use scripting conventions that differ from library code).
        entry: swiftlint lint --config .swiftlint.yml ios/Sources ios/Tests
        language: system
        files: \.swift$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # TypeScript — prettier (formatting)
  # Managed hook: runs automatically when *.ts / *.tsx files exist under web/.
  # No Node setup required — pre-commit installs prettier in its own env.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, json, css]
        files: ^web/
        additional_dependencies:
          - prettier@^3

  # ---------------------------------------------------------------------------
  # TypeScript — ESLint (linting)
  # Runs only when TypeScript files exist under web/.
  # Requires: cd web && npm install  (done once per clone after web/ is created).
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint (TypeScript)
        entry: bash
        args: [-c, "cd web && npx --no-install eslint --max-warnings 0 src"]
        language: system
        files: ^web/src/.*\.[jt]sx?$
        pass_filenames: false
